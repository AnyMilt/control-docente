<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Docente - U.E.M. Albertina Rivas Medina</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: #f4f7f6;
            height: 100vh; display: flex;
        }
        
        /* --- LOGIN --- */
        #pantallaLogin {
            position: fixed; top:0; left:0; width:100vw; height:100vh;
            background-color: #1e1e24; display: flex;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .caja-login {
            background-color: #fff; padding: 40px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center;
            max-width: 350px; width: 100%;
        }
        .caja-login input {
            width: 100%; padding: 12px; margin: 15px 0;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
            font-size: 16px; text-align: center;
        }
        .caja-login button {
            background-color: #007bff; color: white; border: none;
            padding: 12px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .caja-login button:hover { background-color: #0056b3; }
        .error-login { color: red; font-size: 14px; margin-top: 10px; display: none; }

        /* --- SIDEBAR Y FILTROS --- */
        .sidebar {
            width: 320px; background-color: #fff;
            border-right: 1px solid #e0e0e0; display: flex;
            flex-direction: column; height: 100vh;
        }
        .sidebar-header { padding: 15px; background-color: #007bff; color: white; }
        .sidebar-header h3 { margin: 0; font-size: 18px; }
        
        .contenedor-busqueda-filtros {
            background-color: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .txt-buscar {
            width: 100%; padding: 8px 12px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 13px; box-sizing: border-box;
        }
        .seccion-filtros { display: flex; gap: 8px; }
        .seccion-filtros select {
            flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; cursor: pointer;
        }

        .lista-alumnos { flex-grow: 1; overflow-y: auto; list-style: none; margin: 0; padding: 0; }
        .alumno-item {
            padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer;
            position: relative; transition: 0.2s;
        }
        .alumno-item:hover { background-color: #e9ecef; }
        .alumno-item.seleccionado { background-color: #cfe2ff; border-left: 4px solid #007bff; }
        .alumno-nombre { font-weight: bold; display: block; color: #333; font-size: 14px; padding-right: 85px; }
        .alumno-curso { font-size: 12px; color: #666; margin-top: 3px; }
        
        /* Badges de Estado */
        .badge-estado {
            position: absolute; top: 15px; right: 15px;
            font-size: 10px; padding: 3px 8px; border-radius: 12px; font-weight: bold;
        }
        .badge-por-revisar { background-color: #fff3cd; color: #856404; }
        .badge-revisado { background-color: #d4edda; color: #155724; }

        /* --- VISOR CENTRAL --- */
        .visor-codigo { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; background-color: #f8f9fa; }
        .visor-header {
            padding: 15px 20px; background-color: #fff;
            border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center;
        }
        .visor-header h2 { margin: 0; font-size: 18px; color: #333; }
        .controles-header { display: flex; gap: 10px; align-items: center; }
        
        .btn-cambiar-estado {
            padding: 8px 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .btn-marcar-revisado { background-color: #28a745; color: white; }
        .btn-marcar-revisado:hover { background-color: #218838; }
        .btn-marcar-pendiente { background-color: #ffc107; color: #212529; }
        .btn-marcar-pendiente:hover { background-color: #e0a800; }
        
        .btn-descargar {
            background-color: #6c757d; color: white; border: none; padding: 8px 12px;
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .btn-descargar:hover { background-color: #5a6268; }

        .area-trabajo { display: flex; flex-grow: 1; height: calc(100vh - 65px); overflow: hidden; }
        .codigos-fuente { width: 50%; display: flex; flex-direction: column; border-right: 1px solid #e0e0e0; }
        .pestañas-codigo { display: flex; background-color: #eaeaea; }
        .btn-pestana { padding: 10px 15px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; font-size: 13px; }
        .btn-pestana.activa { background-color: #1e1e1e; color: #fff; }
        
        .contenedor-texto {
            flex-grow: 1; background-color: #1e1e1e; color: #d4d4d4; padding: 15px;
            font-family: 'Courier New', Courier, monospace; font-size: 14px; resize: none; border: none; outline: none; width: 100%; box-sizing: border-box; height: 100%;
        }
        
        .vista-previa { width: 50%; background-color: #fff; display: flex; flex-direction: column; }
        .bar-preview { background-color: #f1f1f1; padding: 5px 10px; font-size: 12px; color: #555; border-bottom: 1px solid #ddd; }
        iframe { width: 100%; flex-grow: 1; border: none; background-color: white; }
        
        /* Consola de Errores integrada */
        .consola-errores {
            background-color: #1c1c1c; color: #ff6b6b; font-family: monospace;
            font-size: 12px; max-height: 120px; overflow-y: auto; padding: 10px;
            border-top: 2px solid #ff4757; box-sizing: border-box; display: none;
        }
        .consola-errores.visible { display: block; }
        .consola-ok { color: #2ed573; }

        .sin-seleccion { display: flex; justify-content: center; align-items: center; flex-grow: 1; color: #888; font-size: 16px; }
    </style>
</head>
<body>

<!-- COMPONENTE LOGIN -->
<div id="pantallaLogin">
    <div class="caja-login">
        <h2>Panel Docente</h2>
        <p style="color:#666; font-size:13px;">Clave de acceso de la Albertina Rivas</p>
        <input type="password" id="claveProfesor" placeholder="Contraseña" onkeydown="if(event.key==='Enter') verificarLogin()">
        <button onclick="verificarLogin()">Ingresar</button>
        <div id="errorMsg" class="error-login">❌ Contraseña incorrecta</div>
    </div>
</div>

<!-- SIDEBAR DE SELECCIÓN -->
<div class="sidebar">
    <div class="sidebar-header">
        <h3>Entregas de Tareas</h3>
        <small>U.E.M. Albertina Rivas Medina</small>
    </div>
    
    <!-- BARRA DE BÚSQUEDA Y FILTROS -->
    <div class="contenedor-busqueda-filtros">
        <input type="text" id="txtBuscarAlumno" class="txt-buscar" placeholder="🔍 Buscar estudiante por nombre..." oninput="filtrarYRenderizar()">
        <div class="seccion-filtros">
            <select id="filtroCurso" onchange="filtrarYRenderizar()">
                <option value="TODOS">Todos los Cursos</option>
                <option value="TERCERO INFORMATICA A">3ro Informática A</option>
                <option value="TERCERO INFORMATICA B">3ro Informática B</option>
            </select>
            <select id="filtroEstado" onchange="filtrarYRenderizar()">
                <option value="TODOS">Todos los Estados</option>
                <option value="POR REVISAR">Por Revisar</option>
                <option value="REVISADO">Revisados</option>
            </select>
        </div>
    </div>

    <ul class="lista-alumnos" id="contenedorLista"></ul>
</div>

<!-- VISOR PRINCIPAL -->
<div class="visor-codigo" id="visorCentral">
    <div class="sin-seleccion" id="msgVacio">Selecciona un estudiante de la lista para comenzar la revisión</div>
    
    <div id="cuerpoVisor" style="display: none; height: 100%; flex-direction: column;">
        <div class="visor-header">
            <h2 id="nombreAlumnoTitulo">Estudiante</h2>
            <div class="controles-header">
                <button class="btn-descargar" onclick="descargarProyectoAlumno()">📥 Descargar HTML</button>
                <button id="btnEstadoAccion" class="btn-cambiar-estado" onclick="alternarEstadoActual()"></button>
            </div>
        </div>
        
        <div class="area-trabajo">
            <div class="codigos-fuente">
                <div class="pestañas-codigo">
                    <button class="btn-pestana activa" onclick="cambiarFichaCodigo('html')">HTML</button>
                    <button class="btn-pestana" onclick="cambiarFichaCodigo('css')">CSS</button>
                    <button class="btn-pestana" onclick="cambiarFichaCodigo('js')">JS</button>
                </div>
                <div style="flex-grow: 1; height: 100%;">
                    <textarea id="txtCodigoDocente" class="contenedor-texto" readonly></textarea>
                </div>
            </div>
            <div class="vista-previa">
                <div class="bar-preview">🖥️ Vista de ejecución en vivo:</div>
                <iframe id="iframeResultadoDocente"></iframe>
                <div id="consolaErroresJS" class="consola-errores"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // =========================================================================
    // CREDENCIALES DIRECTAS DE TU PROYECTO EN SUPABASE
    // =========================================================================
    const SUPABASE_URL = "https://dudxwjaildagaqrfekra.supabase.co"; 
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1ZHh3amFpbGRhZ2FxcmZla3JhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNTc1OTYsImV4cCI6MjA5ODkzMzU5Nn0.I3n5F8jWzuerzyz_lB79hAtjlLx3qY7pxySzgep_lz4"; 
    const CONTRASENA_ACCESO = "Albertina2026"; 
    // =========================================================================

    let datosAlumnosTodos = [];
    let alumnoSeleccionadoActual = null;
    let fichaCodigoActual = 'html';

    function verificarLogin() {
        const passwordIngresada = document.getElementById('claveProfesor').value.trim();
        
        if (passwordIngresada === CONTRASENA_ACCESO) {
            document.getElementById('errorMsg').style.display = 'none';
            
            if (SUPABASE_ANON_KEY.includes("PEGA_AQUÍ")) {
                alert("⚠️ Contraseña correcta, pero te falta pegar tu clave larga de Supabase en la línea 205 del código.");
                return;
            }
            
            document.getElementById('pantallaLogin').style.display = 'none';
            cargarEntregasDesdeSupabase();
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    function cargarEntregasDesdeSupabase() {
        fetch(`${SUPABASE_URL}/rest/v1/entregas_tareas?order=id.desc`, {
            method: 'GET',
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        })
        .then(res => {
            if(!res.ok) { throw new Error("Error de respuesta de red"); }
            return res.json();
        })
        .then(data => {
            if (Array.isArray(data)) {
                datosAlumnosTodos = data;
                filtrarYRenderizar();
            } else {
                console.error("Respuesta inesperada de Supabase:", data);
            }
        })
        .catch(err => {
            alert("❌ Error de conexión con Supabase. Verifica que tu clave anónima (línea 205) sea la correcta y no tenga espacios de más.");
            console.error(err);
        });
    }

    function filtrarYRenderizar() {
        const busquedaInput = document.getElementById('txtBuscarAlumno');
        const busqueda = busquedaInput ? busquedaInput.value.toLowerCase().trim() : "";
        
        const cursoSelected = document.getElementById('filtroCurso').value;
        const estadoSelected = document.getElementById('filtroEstado').value;
        const contenedor = document.getElementById('contenedorLista');
        contenedor.innerHTML = "";

        const filtrados = datosAlumnosTodos.filter(alumno => {
            if (!alumno) return false;
            
            const estadoAlumno = alumno.estado ? alumno.estado.toString().trim() : "POR REVISAR";
            const nombreAlumno = alumno.nombre ? alumno.nombre.toString().toLowerCase() : "";
            const paraleloAlumno = alumno.paralelo ? alumno.paralelo.toString().trim() : "";
            
            const cumpleBusqueda = busqueda === "" || nombreAlumno.includes(busqueda);
            const cumpleCurso = (cursoSelected === "TODOS" || paraleloAlumno === cursoSelected);
            const cumpleEstado = (estadoSelected === "TODOS" || estadoAlumno === estadoSelected);
            
            return cumpleBusqueda && cumpleCurso && cumpleEstado;
        });

        if(filtrados.length === 0) {
            contenedor.innerHTML = "<li style='padding:20px; color:#888; text-align:center;'>Ningún estudiante coincide.</li>";
            return;
        }

        filtrados.forEach((alumno) => {
            const li = document.createElement('li');
            li.className = 'alumno-item';
            
            if (alumnoSeleccionadoActual && alumnoSeleccionadoActual.id === alumno.id) {
                li.classList.add('seleccionado');
            }
            
            const estadoTexto = alumno.estado ? alumno.estado.toString().trim() : "POR REVISAR";
            const estadoClass = estadoTexto === "REVISADO" ? "badge-revisado" : "badge-por-revisar";

            li.innerHTML = `
                <span class="alumno-nombre">${alumno.nombre || 'Sin nombre'}</span>
                <span class="alumno-curso">${alumno.paralelo || ''}</span>
                <span class="badge-estado ${estadoClass}">${estadoTexto}</span>
            `;
            li.addEventListener('click', () => verDetalleAlumno(alumno, li));
            contenedor.appendChild(li);
        });
    }

    function verDetalleAlumno(alumno, elementoLista) {
        const items = document.getElementsByClassName('alumno-item');
        for(let item of items) item.classList.remove('seleccionado');
        elementoLista.classList.add('seleccionado');

        alumnoSeleccionadoActual = alumno;
        
        document.getElementById('msgVacio').style.display = 'none';
        document.getElementById('cuerpoVisor').style.display = 'flex';
        document.getElementById('nombreAlumnoTitulo').innerText = `${alumno.nombre || 'Estudiante'} - ${alumno.paralelo || ''}`;
        
        const btnEstado = document.getElementById('btnEstadoAccion');
        const estadoActual = alumno.estado ? alumno.estado.toString().trim() : "POR REVISAR";

        if (estadoActual === "POR REVISAR") {
            btnEstado.innerText = "✓ Marcar como REVISADO";
            btnEstado.className = "btn-cambiar-estado btn-marcar-revisado";
        } else {
            btnEstado.innerText = "⟲ Volver a POR REVISAR";
            btnEstado.className = "btn-cambiar-estado btn-marcar-pendiente";
        }

        cambiarFichaCodigo(fichaCodigoActual);
        ejecutarCodigoAlumno();
    }

    function alternarEstadoActual() {
        if (!alumnoSeleccionadoActual) return;

        const estadoActual = alumnoSeleccionadoActual.estado ? alumnoSeleccionadoActual.estado.toString().trim() : "POR REVISAR";
        const nuevoEstado = estadoActual === "POR REVISAR" ? "REVISADO" : "POR REVISAR";
        
        fetch(`${SUPABASE_URL}/rest/v1/entregas_tareas?id=eq.${alumnoSeleccionadoActual.id}`, {
            method: 'PATCH',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation'
            },
            body: JSON.stringify({ estado: nuevoEstado })
        })
        .then(res => res.json())
        .then(data => {
            alumnoSeleccionadoActual.estado = nuevoEstado;
            const index = datosAlumnosTodos.findIndex(a => a.id === alumnoSeleccionadoActual.id);
            if(index !== -1) datosAlumnosTodos[index].estado = nuevoEstado;
            
            const itemSeleccionado = document.querySelector('.alumno-item.seleccionado');
            if (itemSeleccionado) {
                verDetalleAlumno(alumnoSeleccionadoActual, itemSeleccionado);
            }
            filtrarYRenderizar();
        })
        .catch(err => {
            alert("No se pudo actualizar el estado.");
            console.error(err);
        });
    }

    function cambiarFichaCodigo(ficha) {
        fichaCodigoActual = ficha;
        const botones = document.getElementsByClassName('btn-pestana');
        for(let btn of botones) btn.classList.remove('activa');
        
        if (!alumnoSeleccionadoActual) return;

        if (ficha === 'html') { 
            botones[0].classList.add('activa'); 
            document.getElementById('txtCodigoDocente').value = alumnoSeleccionadoActual.codigo_html || ''; 
        }
        if (ficha === 'css') { 
            botones[1].classList.add('activa'); 
            document.getElementById('txtCodigoDocente').value = alumnoSeleccionadoActual.codigo_css || ''; 
        }
        if (ficha === 'js') { 
            botones[2].classList.add('activa'); 
            document.getElementById('txtCodigoDocente').value = alumnoSeleccionadoActual.codigo_js || ''; 
        }
    }

    function ejecutarCodigoAlumno() {
        if (!alumnoSeleccionadoActual) return;

        const html = alumnoSeleccionadoActual.codigo_html || '';
        const css = alumnoSeleccionadoActual.codigo_css || '';
        const js = alumnoSeleccionadoActual.codigo_js || '';
        const iframe = document.getElementById('iframeResultadoDocente');
        const consola = document.getElementById('consolaErroresJS');
        
        if(consola) {
            consola.innerHTML = "<span class='consola-ok'>✓ Consola activa: Sin errores detectados</span>";
            consola.classList.remove('visible');
        }

        const scriptCapturador = 
            '<' + 'script' + '>' +
            'window.onerror = function(message, source, lineno, colno, error) {' +
            '    window.parent.postMessage({' +
            '        tipo: "error_js",' +
            '        msg: message,' +
            '        linea: lineno' +
            '    }, "*");' +
            '    return false;' +
            '};' +
            '<' + '/script' + '>';

        const codigoCompleto = `
            <!DOCTYPE html>
            <html lang="es">
            <head>
                <meta charset="UTF-8">
                <style>${css}</style>
                ${scriptCapturador}
            </head>
            <body>
                ${html}
                <script>${js}<\/script>
            </body>
            </html>
        `;
        const documentoIframe = iframe.contentDocument || iframe.contentWindow.document;
        documentoIframe.open(); 
        documentoIframe.write(codigoCompleto); 
        documentoIframe.close();
    }

    window.addEventListener('message', function(evento) {
        if (evento.data && evento.data.tipo === 'error_js') {
            const consola = document.getElementById('consolaErroresJS');
            if (consola) {
                consola.innerHTML = `⚠️ <b>Error en JS del Estudiante:</b> ${evento.data.msg} <br> 📍 <b>Línea aproximada:</b> ${evento.data.linea}`;
                consola.classList.add('visible');
            }
        }
    });

    function descargarProyectoAlumno() {
        if (!alumnoSeleccionadoActual) return;
        
        const html = alumnoSeleccionadoActual.codigo_html || '';
        const css = alumnoSeleccionadoActual.codigo_css || '';
        const js = alumnoSeleccionadoActual.codigo_js || '';
        
        // Corrección del error dividiendo las etiquetas script de la descarga
        const contenidoArchivo = `<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto de ${alumnoSeleccionadoActual.nombre}</title>
    <style>
        ${css}
    </style>
</head>
<body>
    ${html}
    ` + '<' + 'script' + `>
        ${js}
    ` + '<' + '/script' + `>
</body>
</html>`;

        const blob = new Blob([contenidoArchivo], { type: 'text/html' });
        const enlaceDescarga = document.createElement('a');
        const nombreLimpio = alumnoSeleccionadoActual.nombre ? alumnoSeleccionadoActual.nombre.replace(/[^a-zA-Z0-9]/g, "_") : "estudiante";
        enlaceDescarga.download = `Proyecto_${nombreLimpio}.html`;
        enlaceDescarga.href = URL.createObjectURL(blob);
        enlaceDescarga.click();
        URL.revokeObjectURL(enlaceDescarga.href);
    }
</script>

</body>
</html>
